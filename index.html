<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Impostor de Coleguis</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-primary: #58a6ff;
            --accent-danger: #f85149;
            --accent-success: #3fb950;
            --text-main: #c9d1d9;
            --text-title: #f0f6fc;
            --border-color: #30363d;
            --shadow: 0 4px 12px rgba(0,0,0,0.5);
            --transition-speed: 0.2s;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
        }

        body {
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .main-container {
            width: 100%;
            max-width: 400px;
        }

        .screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .screen.hidden {
            display: none !important;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            border: 1px solid var(--border-color);
        }

        .game-title {
            color: var(--accent-primary);
            font-weight: 800;
            font-size: 28px;
            margin: 0 0 8px 0;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #79c0ff 0%, #308cf2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .screen-subtitle {
            font-size: 14px;
            color: var(--text-main);
            margin: 0 0 25px 0;
            opacity: 0.7;
            text-align: center;
        }

        /* --- Formularios e Inputs --- */
        .form-group {
            margin-bottom: 15px;
            width: 100%;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-title);
            font-size: 13px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: #21262d;
            color: var(--text-title);
            font-size: 16px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent-primary);
        }

        /* --- Lista de Nombres Dinámica --- */
        .names-list-container {
            max-height: 240px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 5px;
        }

        .name-input-wrapper {
            margin-bottom: 12px;
        }

        /* --- Controles de Configuración --- */
        .player-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(48, 54, 61, 0.4);
            border-radius: 12px;
            padding: 10px 15px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }

        .player-btn {
            background: #21262d;
            border: 1px solid var(--border-color);
            color: var(--accent-primary);
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
        }

        .control-text {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-title);
        }

        /* --- Cajas de Rol y Secreto --- */
        .action-needed-box {
            background: rgba(88, 166, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(88, 166, 255, 0.2);
            margin: 20px 0;
            text-align: center;
            width: 100%;
        }

        .secret-box {
            background: #0d1117;
            padding: 25px;
            border-radius: 16px;
            font-size: 24px;
            font-weight: 800;
            border: 2px solid;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* --- Botones --- */
        .btn {
            background: #238636;
            color: #ffffff;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            box-shadow: var(--shadow);
        }

        .btn:hover { background: #2ea043; }
        .btn-reveal { background: #21262d; border: 1px solid var(--border-color); color: var(--accent-primary); }
        .btn-reveal:hover { background: #30363d; }
    </style>
</head>
<body>

    <div class="main-container">

        <!-- PANTALLA 1: CONFIGURACIÓN GENERAL -->
        <div id="screen-setup" class="screen">
            <div class="card">
                <h1 class="game-title">IMPOSTOR</h1>
                <p class="screen-subtitle">Configura los jugadores e impostores</p>

                <!-- Control de Jugadores -->
                <div class="player-control">
                    <span id="total-players-text" class="control-text">Jugadores: 4</span>
                    <div>
                        <button class="player-btn" onclick="changePlayers(-1)">-</button>
                        <button class="player-btn" onclick="changePlayers(1)">+</button>
                    </div>
                </div>

                <!-- Control de Impostores -->
                <div class="player-control">
                    <span id="total-impostors-text" class="control-text">Impostores: 1</span>
                    <div>
                        <button class="player-btn" onclick="changeImpostors(-1)">-</button>
                        <button class="player-btn" onclick="changeImpostors(1)">+</button>
                    </div>
                </div>

                <button class="btn" onclick="goToNamesScreen()" style="margin-top: 10px;">Siguiente: Nombres ➡️</button>
            </div>
        </div>

        <!-- PANTALLA 2: ENTRADA DE NOMBRES -->
        <div id="screen-names" class="screen hidden">
            <div class="card">
                <h1 class="game-title">¿QUIÉN JUEGA?</h1>
                <p class="screen-subtitle">Introduce los nombres de tus amigos</p>
                
                <div id="names-inputs-container" class="names-list-container">
                    <!-- Generado dinámicamente -->
                </div>

                <button class="btn" onclick="startGame()">¡Empezar Partida! 🚀</button>
            </div>
        </div>

        <!-- PANTALLA 3: REVELAR ROLES -->
        <div id="screen-game" class="screen hidden">
            <div class="card">
                <div style="text-align: center; margin-bottom: 20px;">
                    <h2 id="turn-title" style="color: var(--text-title); margin: 0; font-size: 26px;">Nombre</h2>
                    <p id="turn-subtitle" class="screen-subtitle" style="margin: 5px 0 0 0;">Te toca ver tu rol</p>
                </div>
                
                <button class="btn btn-reveal" id="btn-reveal" onclick="revealRole()">👁️ VER MI ROL EN SECRETO</button>
                
                <div id="secret-word-display" class="action-needed-box hidden">
                    <p class="screen-subtitle" style="margin-bottom: 10px;">Tu palabra clave es:</p>
                    <div id="secret-word" class="secret-box"></div>
                    <p class="screen-subtitle" style="margin-top: 15px; margin-bottom: 0;">¡Pasa el móvil boca abajo!</p>
                </div>

                <button class="btn" id="btn-next" onclick="nextTurn()" style="margin-top: 20px; display: none;">SIGUIENTE JUGADOR ➡️</button>
            </div>
        </div>

        <!-- PANTALLA 4: JUEGO EN PROCESO -->
        <div id="screen-play" class="screen hidden">
            <div class="card">
                <h1 class="game-title">¡RONDAS!</h1>
                <p class="screen-subtitle" id="impostors-count-text">Hay X impostores ocultos.</p>
                <div class="secret-box" style="border-color: var(--accent-primary); border-style: dotted; min-height: 80px; font-size: 22px; color: var(--accent-primary);">🗣️ ¡A preguntar!</div>
                <button class="btn btn-reveal" onclick="resetGame()" style="margin-top: 30px;">🔄 NUEVA PARTIDA</button>
            </div>
        </div>

    </div>

    <script>
        // ✏️ EDITA AQUÍ: Tu lista única de palabras del grupo
        const palabrasSecretas = [
            "En la buena",
            "Pailas",
            "Grua",
            "Se te moja la canoa",
            "Tate Manzana",
            "Pilas",
            "Caigo en Gajo",   
            "Voltiarepa",
            "Caleta",
            "Sisas"
        ];

        let totalPlayers = 4;
        let totalImpostors = 1;
        let jugadores = [];
        let impostoresIndices = [];
        let currentPlayer = 0;
        let palabraDeLaRonda = "";

        function changePlayers(amount) {
            totalPlayers = Math.max(3, Math.min(12, totalPlayers + amount));
            document.getElementById('total-players-text').innerText = `Jugadores: ${totalPlayers}`;
            
            const maxImpostorsPermitidos = Math.floor((totalPlayers - 1) / 2);
            if (totalImpostors > maxImpostorsPermitidos) {
                totalImpostors = Math.max(1, maxImpostorsPermitidos);
                document.getElementById('total-impostors-text').innerText = `Impostores: ${totalImpostors}`;
            }
        }

        function changeImpostors(amount) {
            const maxImpostorsPermitidos = Math.floor((totalPlayers - 1) / 2);
            totalImpostors = Math.max(1, Math.min(maxImpostorsPermitidos, totalImpostors + amount));
            document.getElementById('total-impostors-text').innerText = `Impostores: ${totalImpostors}`;
        }

        function switchScreen(fromId, toId) {
            document.getElementById(fromId).classList.add('hidden');
            document.getElementById(toId).classList.remove('hidden');
        }

        function goToNamesScreen() {
            const container = document.getElementById('names-inputs-container');
            container.innerHTML = '';
            
            for (let i = 1; i <= totalPlayers; i++) {
                container.innerHTML += `
                    <div class="name-input-wrapper">
                        <label>Jugador ${i}</label>
                        <input type="text" class="player-name-input" value="Jugador ${i}" onfocus="this.select()">
                    </div>
                `;
            }
            switchScreen('screen-setup', 'screen-names');
        }

        function startGame() {
            const inputs = document.querySelectorAll('.player-name-input');
            jugadores = Array.from(inputs).map(input => input.value.trim() || "Anónimo");

            // Selección de palabra aleatoria de vuestra lista única
            palabraDeLaRonda = palabrasSecretas[Math.floor(Math.random() * palabrasSecretas.length)];

            impostoresIndices = [];
            while(impostoresIndices.length < totalImpostors) {
                let indexAleatorio = Math.floor(Math.random() * totalPlayers);
                if(!impostoresIndices.includes(indexAleatorio)) {
                    impostoresIndices.push(indexAleatorio);
                }
            }

            currentPlayer = 0;
            switchScreen('screen-names', 'screen-game');
            updateTurnView();
        }

        function updateTurnView() {
            document.getElementById('turn-title').innerText = jugadores[currentPlayer];
            document.getElementById('turn-subtitle').innerText = `Te toca mirar la pantalla`;
            
            document.getElementById('secret-word-display').classList.add('hidden');
            document.getElementById('btn-reveal').style.display = 'block';
            document.getElementById('btn-next').style.display = 'none';
        }

        function revealRole() {
            const secretBox = document.getElementById('secret-word');
            const displayBox = document.getElementById('secret-word-display');
            
            if (impostoresIndices.includes(currentPlayer)) {
                secretBox.innerText = "🕵️‍♂️ IMPOSTOR";
                secretBox.style.color = "var(--accent-danger)";
                secretBox.style.borderColor = "rgba(248, 81, 73, 0.5)";
            } else {
                secretBox.innerText = palabraDeLaRonda.toUpperCase();
                secretBox.style.color = "var(--accent-success)";
                secretBox.style.borderColor = "rgba(63, 185, 80, 0.5)";
            }
            
            displayBox.classList.remove('hidden');
            document.getElementById('btn-reveal').style.display = 'none';
            document.getElementById('btn-next').style.display = 'block';
        }

        function nextTurn() {
            currentPlayer++;
            if (currentPlayer < totalPlayers) {
                updateTurnView();
            } else {
                document.getElementById('impostors-count-text').innerText = `Hay ${totalImpostors} ${totalImpostors > 1 ? 'impostores ocultos' : 'impostor oculto'} en el grupo.`;
                switchScreen('screen-game', 'screen-play');
            }
        }

        function resetGame() {
            switchScreen('screen-play', 'screen-setup');
        }
    </script>
</body>
</html>
