<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Impostor | Minimal UI</title>
    <style>
        :root {
            --bg: #050505;
            --surface: #111111;
            --text: #ffffff;
            --dim: #666666;
            --accent: #ffffff;
            --danger: #ff3b30;
            --success: #34c759;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .container { width: 100%; max-width: 400px; }
        .hidden { display: none !important; }

        h1 { font-size: 18px; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 25px; text-align: center; color: var(--dim); }
        
        .card { background: var(--surface); padding: 30px; border-radius: 12px; border: 1px solid #222; width: 100%; }
        
        button { background: transparent; border: 1px solid #333; color: var(--text); padding: 14px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 14px; transition: 0.2s; margin-top: 10px; font-weight: 500; }
        button:active { background: #222; }
        .btn-primary { background: var(--accent); color: var(--bg); border: none; font-weight: 600; }
        .btn-back { border: none; color: var(--dim); font-size: 12px; margin-top: 20px; text-align: center; width: 100%; background: transparent; }
        .btn-back:active { background: transparent; color: #fff; }

        label { display: block; color: var(--dim); font-size: 12px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; background: #000; border: 1px solid #333; padding: 12px; border-radius: 8px; color: #fff; margin-bottom: 15px; font-size: 15px; outline: none; }
        input:focus { border-color: #555; }
        
        .names-container { max-height: 250px; overflow-y: auto; padding-right: 5px; margin-bottom: 15px; }
        
        .role-display { font-size: 24px; font-weight: 600; text-align: center; padding: 35px 0; letter-spacing: 0.5px; }
        .is-impostor { color: var(--danger); }
        .is-innocent { color: var(--success); }
        
        .pass-instruction { color: var(--dim); font-size: 14px; text-align: center; margin-bottom: 20px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <!-- PANTALLA 1: CONFIGURACIÓN -->
    <div id="screen-setup">
        <h1>Configuración</h1>
        <div class="card">
            <label>Jugadores</label>
            <input type="number" id="num-players" value="4" min="3">
            
            <label>Impostores</label>
            <input type="number" id="num-impostors" value="1" min="1">
            
            <button class="btn-primary" onclick="setupNames()">Continuar</button>
        </div>
    </div>

    <!-- PANTALLA 2: NOMBRES -->
    <div id="screen-names" class="hidden">
        <h1>Participantes</h1>
        <div class="card">
            <div id="names-inputs" class="names-container"></div>
            <button class="btn-primary" onclick="startGame()">Empezar Juego</button>
            <button class="btn-back" onclick="showScreen('screen-setup')">← Volver a ajustes</button>
        </div>
    </div>

    <!-- PANTALLA 3: TURNO -->
    <div id="screen-turn" class="hidden">
        <h1 id="turn-name">Jugador</h1>
        <div class="card">
            <div id="turn-content">
                <!-- Contenido dinámico -->
            </div>
        </div>
        <button class="btn-back" id="btn-correct-names" onclick="rollbackToNames()">← Corregir nombres</button>
    </div>

    <!-- PANTALLA 4: JUEGO EN PROCESO -->
    <div id="screen-play" class="hidden">
        <h1>A Debatir</h1>
        <div class="card" style="text-align: center;">
            <div class="role-display" style="color: var(--dim)">Ronda en curso</div>
            <button class="btn-primary" onclick="resetGame()">Nueva Partida</button>
        </div>
    </div>
</div>

<script>
   
    const palabras = [
         "En la buena",
            "Pailas",
            "Grua",
            "Se te moja la canoa",
            "Tate Manzana",
            "Pilas",
            "Caigo en Gajo",   
            "Voltiarepa",
            "Caleta",
            "Sisas"
    ];

    let state = { players: [], impostors: [], current: 0, secret: "" };

    function showScreen(id) {
        document.getElementById('screen-setup').classList.add('hidden');
        document.getElementById('screen-names').classList.add('hidden');
        document.getElementById('screen-turn').classList.add('hidden');
        document.getElementById('screen-play').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }

    function setupNames() {
        const n = parseInt(document.getElementById('num-players').value) || 4;
        const cont = document.getElementById('names-inputs');
        cont.innerHTML = '';
        for(let i=0; i<n; i++) {
            cont.innerHTML += `
                <div>
                    <label>Jugador ${i+1}</label>
                    <input type="text" class="name-in" placeholder="Jugador ${i+1}">
                </div>`;
        }
        showScreen('screen-names');
    }

    function startGame() {
        state.players = Array.from(document.querySelectorAll('.name-in')).map(i => i.value.trim() || i.placeholder);
        state.secret = palabras[Math.floor(Math.random() * palabras.length)];
        state.impostors = [];
        
        const nImp = parseInt(document.getElementById('num-impostors').value) || 1;
        
        // El número máximo de impostores no puede ser igual o mayor al total de jugadores
        const finalImpCount = Math.min(nImp, state.players.length - 1);

        // Algoritmo de mezcla aleatoria (Fisher-Yates simplificado) para garantizar azar real
        let indicesDisponibles = [];
        for (let i = 0; i < state.players.length; i++) {
            indicesDisponibles.push(i);
        }

        while(state.impostors.length < finalImpCount) {
            let randomIndex = Math.floor(Math.random() * indicesDisponibles.length);
            let selectedPlayerIndex = indicesDisponibles.splice(randomIndex, 1)[0];
            state.impostors.push(selectedPlayerIndex);
        }
        
        state.current = 0;
        showScreen('screen-turn');
        prepareTurnDisplay();
    }

    function prepareTurnDisplay() {
        document.getElementById('turn-name').innerText = state.players[state.current];
        document.getElementById('turn-content').innerHTML = `
            <div class="pass-instruction">Asegúrate de que solo tú estás viendo la pantalla.</div>
            <button class="btn-primary" onclick="revealRole()">Ver mi rol</button>
        `;
        
        if (state.current === 0) {
            document.getElementById('btn-correct-names').classList.remove('hidden');
        } else {
            document.getElementById('btn-correct-names').classList.add('hidden');
        }
    }

    function revealRole() {
        document.getElementById('btn-correct-names').classList.add('hidden');

        const isImp = state.impostors.includes(state.current);
        document.getElementById('turn-content').innerHTML = `
            <div class="role-display ${isImp ? 'is-impostor' : 'is-innocent'}">
                ${isImp ? 'IMPOSTOR' : state.secret.toUpperCase()}
            </div>
            <button class="btn-primary" onclick="handleNextStep()">Terminar mi turno</button>
        `;
    }

    function handleNextStep() {
        state.current++;
        if(state.current >= state.players.length) {
            showScreen('screen-play');
        } else {
            prepareTurnDisplay();
        }
    }

    function rollbackToNames() {
        showScreen('screen-names');
    }

    function resetGame() {
        showScreen('screen-setup');
    }
</script>
</body>
</html>
